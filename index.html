const { useState, useEffect, useRef } = React;

function useOnScreen(threshold = 0.12) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const ob = new IntersectionObserver(([e]) => {if (e.isIntersecting) setVis(true);}, { threshold });
    if (ref.current) ob.observe(ref.current);
    return () => ob.disconnect();
  }, []);
  return [ref, vis];
}

const carouselImages = [];


function CarouselStrip() {
  const trackRef = useRef(null);

  useEffect(() => {
    const track = trackRef.current;
    if (!track) return;
    function update() {
      const cards = track.querySelectorAll('.cc-card');
      const trackRect = track.getBoundingClientRect();
      const centerX = trackRect.left + trackRect.width / 2;
      cards.forEach((card) => {
        const rect = card.getBoundingClientRect();
        const cardCx = rect.left + rect.width / 2;
        const dist = (cardCx - centerX) / (trackRect.width / 2);
        const clamped = Math.max(-1, Math.min(1, dist));
        const rotY = clamped * 28;
        const scale = 1 - Math.abs(clamped) * 0.08;
        const transZ = -Math.abs(clamped) * 40;
        card.style.transform = `perspective(900px) rotateY(${rotY}deg) scale(${scale}) translateZ(${transZ}px)`;
        card.style.opacity = String(1 - Math.abs(clamped) * 0.3);
      });
    }
    track.addEventListener('scroll', update, { passive: true });
    update();
    return () => track.removeEventListener('scroll', update);
  }, []);

  return (
    <div style={{ marginTop: '4rem', overflow: 'hidden' }}>
      <div ref={trackRef} style={{
        display: 'flex', gap: '24px', overflowX: 'scroll', overflowY: 'visible',
        paddingBottom: '1.5rem', paddingTop: '1rem',
        scrollSnapType: 'x mandatory',
        scrollbarWidth: 'none', msOverflowStyle: 'none',
        cursor: 'grab'
      }}
      onMouseDown={(e) => {
        const el = e.currentTarget;
        el.style.cursor = 'grabbing';
        const startX = e.pageX - el.offsetLeft;
        const scrollLeft = el.scrollLeft;
        const onMove = (ev) => {el.scrollLeft = scrollLeft - (ev.pageX - el.offsetLeft - startX);};
        const onUp = () => {el.style.cursor = 'grab';window.removeEventListener('mousemove', onMove);window.removeEventListener('mouseup', onUp);};
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      }}>
        {carouselImages.map((src, i) =>
        <div key={i} className="cc-card" style={{
          flexShrink: 0, width: 332, height: 423,
          scrollSnapAlign: 'center', overflow: 'hidden', borderRadius: 8,
          transition: 'transform .15s ease, opacity .15s ease',
          willChange: 'transform'
        }}>
            <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center', display: 'block', pointerEvents: 'none' }} />
          </div>
        )}
      </div>
    </div>);

}

    <div style={{ marginBottom: '1.3rem' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.45rem' }}>
        <span style={{ fontFamily: 'var(--sans)', fontSize: '0.84rem', color: '#fff' }}>{name}</span>
        <span style={{ fontFamily: 'var(--sans)', fontSize: '0.72rem', color: 'rgba(255,255,255,.4)' }}>{pct}%</span>
      </div>
      <div style={{ height: 1, background: 'rgba(255,255,255,.15)', position: 'relative' }}>
        <div className={`skill-fill ${on ? 'on' : ''}`} style={{ transitionDelay: delay + 's' }} />
      </div>
    </div>);

}

function Stars({ n }) {
  return <div style={{ display: 'flex', gap: 3, marginBottom: '1.5rem' }}>{Array.from({ length: n }).map((_, i) => <span key={i} style={{ color: 'var(--acc)', fontSize: '0.9rem' }}>★</span>)}</div>;
}

function Testimonials() {
  const [cur, setCur] = useState(0);
  const [r, v] = useOnScreen();
  useEffect(() => {
    const t = setInterval(() => setCur((c) => (c + 1) % testimonials.length), 5200);
    return () => clearInterval(t);
  }, []);
  const t = testimonials[cur];
  return (
    <section style={{ borderTop: '1px solid var(--line)', padding: '8rem 3rem', display: 'grid', gridTemplateColumns: '1fr 2fr', gap: '4rem', alignItems: 'center' }}>
      <div ref={r} className={`up ${v ? 'on' : ''}`}>
        <p style={{ fontFamily: 'var(--sans)', fontSize: '0.72rem', letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--mid)', marginBottom: '1.5rem' }}>Client Words</p>
        <h2 style={{ fontFamily: 'var(--serif)', fontWeight: 700, fontSize: 'clamp(2rem,4vw,3.2rem)', fontWeight: 400, lineHeight: 1.1, marginBottom: '1.5rem' }}>what they said.</h2>
        <div style={{ display: 'flex', gap: '0.5rem' }}>
          {testimonials.map((_, i) =>
          <button key={i} onClick={() => setCur(i)} style={{
            width: i === cur ? 20 : 6, height: 6, borderRadius: 3,
            background: i === cur ? 'var(--ink)' : 'var(--line)',
            border: 'none', cursor: 'pointer', padding: 0, transition: 'all .3s'
          }} />
          )}
        </div>
      </div>
      <div style={{ borderLeft: '1px solid var(--line)', paddingLeft: '4rem' }}>
        <Stars n={t.stars} />
        <p style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', fontSize: 'clamp(1.05rem,2vw,1.35rem)', color: 'var(--ink)', lineHeight: 1.72, marginBottom: '2rem', minHeight: 120 }}>
          "{t.q}"
        </p>
        <div>
          <div style={{ fontFamily: 'var(--sans)', fontSize: '0.85rem', fontWeight: 500, color: 'var(--ink)' }}>{t.name}</div>
          <div style={{ fontFamily: 'var(--sans)', fontSize: '0.72rem', color: 'var(--mid)', marginTop: 2 }}>{t.role}</div>
        </div>
      </div>
    </section>);

}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{ "accentColor": "#C8FF57", "bgColor": "#F9F8F5", "inkColor": "#0D0D0B" } /*EDITMODE-END*/;

function TweaksPanel({ visible, tweaks, onChange, onClose }) {
  if (!visible) return null;
  return (
    <div style={{ position: 'fixed', bottom: '2rem', right: '2rem', zIndex: 300, background: 'var(--bg)', border: '1px solid var(--line)', padding: '1.5rem', width: 256, boxShadow: '0 20px 60px rgba(0,0,0,.1)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.2rem' }}>
        <p style={{ fontFamily: 'var(--sans)', fontSize: '0.68rem', letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--mid)' }}>Tweaks</p>
        <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--mid)', fontSize: '1rem', lineHeight: 1 }}>✕</button>
      </div>
      {[['Accent Color', 'accentColor'], ['Background', 'bgColor'], ['Ink', 'inkColor']].map(([label, key]) =>
      <label key={key} style={{ display: 'block', marginBottom: '1rem' }}>
          <span style={{ fontFamily: 'var(--sans)', fontSize: '0.73rem', color: 'var(--mid)', display: 'block', marginBottom: '0.4rem' }}>{label}</span>
          <input type="color" value={tweaks[key]} onChange={(e) => onChange(key, e.target.value)}
        style={{ width: '100%', height: 32, border: '1px solid var(--line)', cursor: 'pointer', padding: 2, background: 'none' }} />
        </label>
      )}
    </div>);

}

/* ─── APP ─────────────────────────────────────────────────────────────── */
function App() {
  const [active, setActive] = useState('hero');
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    const sections = ['hero', 'about', 'work', 'skills', 'contact'];
    const fn = () => {
      const y = window.scrollY + 200;
      for (const id of [...sections].reverse()) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) {setActive(id);break;}
      }
    };
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  function applyTweak(key, val) {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    const map = { accentColor: '--acc', bgColor: '--bg', inkColor: '--ink' };
    document.documentElement.style.setProperty(map[key], val);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  }

  return (
    <>
      <Nav active={active} />
      <Hero />
      <Marquee />
      <Achievements />
      <WhatIDo />
      <About />
      <Work />
      <SocialMedia />
      <Skills />
      <Testimonials />
      <Contact />
      <Footer />
      <TweaksPanel visible={tweaksVisible} tweaks={tweaks} onChange={applyTweak}
      onClose={() => {setTweaksVisible(false);window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');}} />
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
